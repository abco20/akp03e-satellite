name: host-tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: host-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run host tests
        run: ./scripts/host-test.sh
